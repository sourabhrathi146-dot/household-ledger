<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ledger">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#12181B">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
<title>Household Ledger</title>
<style>
  :root{
    --bg:#12181B; --surface:#1B2226; --surface-2:#161C1F; --border:#2A3236; --border-strong:#333F44;
    --text:#EDE6D6; --text-muted:#8E9490; --text-faint:#6B716C;
    --gold:#C9A227; --gold-bright:#DBB53A; --red:#D9776A; --green:#6FB08A;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;}
  .display{font-family:Georgia,"Times New Roman",serif;}
  #app{max-width:720px;margin:0 auto;padding:1.5rem 1rem 4rem;}
  header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;margin-bottom:24px;}
  .eyebrow{display:flex;align-items:center;gap:8px;color:var(--gold);font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;}
  h1{font-size:26px;font-weight:500;margin:0;}
  .month-nav{display:flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px;}
  .month-nav button{background:none;border:none;color:var(--text-faint);font-size:18px;width:32px;height:32px;border-radius:6px;cursor:pointer;}
  .month-nav button:active{background:var(--surface-2);color:var(--text);}
  .month-label{font-size:13px;min-width:130px;text-align:center;}
  .stub{background:var(--surface);border:1px dashed #37423F;border-radius:4px;padding:14px 16px;position:relative;}
  .stub::before{content:"";position:absolute;top:-6px;left:16px;right:16px;height:1px;background:repeating-linear-gradient(90deg,#46524D 0 6px,transparent 6px 12px);}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
  .stat-label{font-size:11px;color:var(--text-muted);margin-bottom:6px;}
  .stat-value{font-size:19px;font-weight:600;}
  .bar-track{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--gold);transition:width .5s cubic-bezier(.22,1,.36,1);}
  .btn{background:var(--gold);color:var(--bg);border:none;border-radius:6px;padding:9px 16px;font-weight:600;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:transform .1s ease;}
  .btn:active{background:var(--gold-bright);transform:scale(.97);}
  .btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border-strong);border-radius:6px;padding:9px 16px;font-size:14px;cursor:pointer;transition:transform .1s ease;}
  .btn-ghost:active{transform:scale(.97);}
  .btn-icon{background:none;border:none;color:var(--text-faint);cursor:pointer;padding:6px;border-radius:4px;font-size:15px;}
  .btn-icon:active{background:var(--surface-2);color:var(--text);}
  input,select{background:var(--surface-2);border:1px solid var(--border-strong);color:var(--text);border-radius:6px;padding:9px 11px;font-size:14px;width:100%;font-family:inherit;}
  input:focus,select:focus{outline:none;border-color:var(--gold);}
  label{font-size:11px;color:var(--text-muted);display:block;margin-bottom:4px;}
  .field{margin-bottom:10px;}
  .field-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;}
  section{margin-bottom:24px;}
  .section-title{font-size:13px;color:var(--text-muted);margin-bottom:10px;}
  .chart-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;flex-wrap:wrap;}
  .cat-bar-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;opacity:0;animation:fade-up .4s ease forwards;animation-delay:calc(var(--stagger,0) * 45ms);}
  .cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .cat-bar-track{flex:1;height:14px;background:var(--surface-2);border-radius:3px;overflow:hidden;}
  .cat-bar-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.22,1,.36,1);}
  .cat-bar-label{width:104px;flex-shrink:0;display:flex;align-items:center;gap:6px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cat-bar-value{width:70px;text-align:right;flex-shrink:0;}
  .cat-badge{border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .cat-breakdown-row{display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
  .donut-seg{animation:donut-grow .7s cubic-bezier(.22,1,.36,1) backwards;}
  .toggle-switch{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;}
  .toggle-switch input{position:absolute;opacity:0;width:0;height:0;}
  .toggle-track{width:30px;height:17px;border-radius:999px;background:var(--border-strong);position:relative;transition:background .18s ease;flex-shrink:0;}
  .toggle-switch input:checked ~ .toggle-track{background:var(--gold);}
  .toggle-thumb{position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:var(--text);transition:transform .18s ease;}
  .toggle-switch input:checked ~ .toggle-track .toggle-thumb{transform:translateX(13px);background:var(--bg);}
  .toggle-label{font-size:11px;color:var(--text-muted);}
  .tag-chip{font-size:12px;padding:4px 10px;border-radius:999px;cursor:pointer;border:1px solid var(--border-strong);background:transparent;color:var(--text-muted);}
  .tag-chip.active{border-color:var(--gold);background:rgba(201,162,39,.15);color:var(--gold);}
  .entry-list{border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .entry{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface-2);border-top:1px solid var(--border);opacity:0;animation:fade-up .35s ease forwards;animation-delay:calc(var(--stagger,0) * 40ms);}
  .entry:first-child{border-top:none;}
  .entry-name{font-size:14px;display:flex;align-items:center;gap:8px;}
  .entry-note{font-size:12px;color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .entry-tag{font-size:10px;padding:1px 8px;border-radius:999px;border:1px solid var(--border-strong);color:var(--text-muted);}
  .empty{text-align:center;padding:32px 16px;color:var(--text-faint);font-size:13px;}
  .drive-status{display:flex;align-items:center;gap:6px;}
  .drive-dot{width:7px;height:7px;border-radius:50%;background:var(--text-faint);flex-shrink:0;}
  .drive-dot.on{background:var(--green);}
  .drive-dot.busy{background:var(--gold);}
  .drive-dot.err{background:var(--red);}
  .day-group{margin-bottom:10px;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .day-group summary{list-style:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface-2);}
  .day-group summary::-webkit-details-marker{display:none;}
  .day-summary-left{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);}
  .day-summary-right{display:flex;align-items:center;gap:8px;}
  .day-chevron{color:var(--text-faint);font-size:11px;transition:transform .15s;display:inline-block;}
  .day-group[open] .day-chevron{transform:rotate(180deg);}
  .day-group .entry-list{border:none;border-top:1px solid var(--border);border-radius:0;}
  .hamburger-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;flex-shrink:0;}
  .hamburger-dot{position:absolute;bottom:2px;right:2px;width:8px;height:8px;border-radius:50%;background:var(--text-faint);border:2px solid var(--surface);}
  .hamburger-dot.on{background:var(--green);}
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s;}
  .drawer-overlay.open{opacity:1;pointer-events:auto;}
  .drawer-panel{position:fixed;top:0;right:0;bottom:0;width:min(300px,84vw);background:var(--surface);border-left:1px solid var(--border-strong);z-index:41;transform:translateX(100%);transition:transform .22s ease;padding:18px;overflow-y:auto;}
  .drawer-panel.open{transform:translateX(0);}
  .drawer-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .drawer-title{font-size:15px;font-weight:600;}
  .drawer-close{background:none;border:none;color:var(--text-faint);font-size:20px;cursor:pointer;padding:4px;}
  .drawer-section{margin-bottom:20px;}
  .drawer-section-title{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);margin-bottom:10px;}
  .drawer-btn{width:100%;text-align:left;background:var(--surface-2);border:1px solid var(--border-strong);color:var(--text);border-radius:6px;padding:10px 12px;font-size:13px;cursor:pointer;margin-bottom:8px;display:block;}
  .drawer-btn:active{background:var(--border);}
  .drawer-note{font-size:11px;color:var(--text-faint);line-height:1.5;}
  .offline-note{font-size:11px;color:var(--text-faint);text-align:center;margin-top:24px;}
  svg text{font-family:-apple-system,sans-serif;fill:var(--text-muted);}
  @keyframes fade-up{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  @keyframes donut-grow{from{stroke-width:0;}to{stroke-width:13;}}
  .day-group .entry-list{animation:fade-up .25s ease;}
  @media (prefers-reduced-motion: reduce){
    .cat-bar-item,.entry,.donut-seg,.day-group .entry-list{animation:none !important;opacity:1 !important;}
    .bar-fill,.cat-bar-fill,.drawer-panel,.drawer-overlay,.day-chevron{transition:none !important;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
const CAT_ICON_PATHS = {
  electricity: '<path d="M9.3 1.2 3.4 9.3h3.9L6.3 15l6.3-8.9H8.6l.7-4.9z"/>',
  grocery: '<path d="M3.2 6.2h9.6l-.9 6.9a1.1 1.1 0 0 1-1.1 1H5.2a1.1 1.1 0 0 1-1.1-1l-.9-6.9z"/><path d="M6 6.2a2 2 0 0 1 4 0" fill="none" stroke-width="1.3" stroke="currentColor"/>',
  water: '<path d="M8 1.8s4.6 5.7 4.6 8.8a4.6 4.6 0 1 1-9.2 0C3.4 7.5 8 1.8 8 1.8z"/>',
  rent: '<path d="M8 1.8 2 7v7.2h3.7V9.6h4.6v4.6H14V7L8 1.8z"/>',
  internet: '<circle cx="8" cy="12.6" r="1.1"/><path d="M4.6 9.8a4.9 4.9 0 0 1 6.8 0" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M2.1 7.2a8.6 8.6 0 0 1 11.8 0" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>',
  transport: '<path d="M3.1 10.4 4 6.6a1.4 1.4 0 0 1 1.4-1h5.2a1.4 1.4 0 0 1 1.4 1l.9 3.8" fill="none" stroke="currentColor" stroke-width="1.3"/><rect x="2.2" y="10.2" width="11.6" height="2.8" rx="1"/><circle cx="5" cy="14" r="1.15"/><circle cx="11" cy="14" r="1.15"/>',
  dining: '<path d="M5.1 1.8v4.6M6.4 1.8v4.6M5.75 6.4v7.8" stroke="currentColor" stroke-width="1.25" fill="none" stroke-linecap="round"/><path d="M10.6 1.8c0 1.8-1 2.6-1 4.3s.9 1.8.9 1.8v6.1" stroke="currentColor" stroke-width="1.25" fill="none" stroke-linecap="round"/>',
  medical: '<path d="M6.4 1.9h3.2v4.3H14v3.2H9.6v4.3H6.4V9.4H2V6.2h4.4V1.9z"/>',
  entertainment: '<path d="M2 5.1a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1.3a1.3 1.3 0 0 0 0 2.5V10a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V8.9a1.3 1.3 0 0 0 0-2.5V5.1z"/>',
  other: '<circle cx="8" cy="8" r="2.6"/><circle cx="8" cy="8" r="4.6" fill="none" stroke="currentColor" stroke-width="1"/>',
  dairy: '<path d="M4.6 6 8 2.2 11.4 6v7.3a1 1 0 0 1-1 1H5.6a1 1 0 0 1-1-1V6z"/><rect x="4.6" y="6.4" width="6.8" height="1" fill="var(--bg)"/>',
  fruitveg: '<path d="M8.7 5.6 12.8 9.7a1.6 1.6 0 0 1 0 2.3l-.3.3a1.6 1.6 0 0 1-2.3 0L6.1 8.2 8.7 5.6z"/><path d="M9.1 4.8c.5-1.5 2-2.3 2-2.3s.3 1.6-.9 2.7" stroke="currentColor" stroke-width="1" fill="none" stroke-linecap="round"/><path d="M9.7 3.6c-.8-1-2.5-1-2.5-1s.1 1.6 1.6 2.2" stroke="currentColor" stroke-width="1" fill="none" stroke-linecap="round"/>',
};

function hexToRgba(hex, alpha){
  const h = hex.replace("#","");
  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function catIconSvg(cat, size){
  const s = size || 15;
  return `<svg width="${s}" height="${s}" viewBox="0 0 16 16" fill="${cat.color}" style="flex-shrink:0;">${CAT_ICON_PATHS[cat.id] || CAT_ICON_PATHS.other}</svg>`;
}

function catBadge(cat, size){
  const px = size || 28;
  return `<span class="cat-badge" style="width:${px}px;height:${px}px;background:${hexToRgba(cat.color,0.16)};">${catIconSvg(cat, Math.round(px*0.52))}</span>`;
}

const inrCompact = n => new Intl.NumberFormat("en-IN",{notation:"compact",maximumFractionDigits:1}).format(n||0);

function renderCategoryDonut(byCategory, total){
  const positive = byCategory.filter(c=>c.total>0);
  if (!positive.length || total<=0) return "";
  const r = 42, cx = 54, cy = 54, sw = 13, circumference = 2*Math.PI*r;
  let offset = 0;
  const segs = positive.map(c=>{
    const len = Math.max((c.total/total)*circumference, positive.length>1 ? 2 : circumference);
    const gap = positive.length>1 ? 1.5 : 0;
    const dash = Math.max(len-gap, 1);
    const circle = `<circle class="donut-seg" cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${c.color}" stroke-width="${sw}" stroke-linecap="round" stroke-dasharray="${dash} ${circumference-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"></circle>`;
    offset += len;
    return circle;
  }).join("");
  return `<svg viewBox="0 0 108 108" width="108" height="108" style="flex-shrink:0;">
    ${segs}
    <text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="14" font-weight="600" fill="var(--text)" font-family="ui-monospace,SFMono-Regular,monospace">${esc(inrCompact(total))}</text>
    <text x="${cx}" y="${cy+13}" text-anchor="middle" font-size="8" fill="var(--text-faint)">${positive.length} categor${positive.length===1?"y":"ies"}</text>
  </svg>`;
}

const CATEGORIES = [
  { id:"electricity", label:"Electricity", color:"#C9A227" },
  { id:"grocery", label:"Grocery", color:"#4F9C87" },
  { id:"dairy", label:"Dairy", color:"#D9C9A0" },
  { id:"fruitveg", label:"Fruits & vegetables", color:"#6FAE4A" },
  { id:"water", label:"Water", color:"#4A85B0" },
  { id:"rent", label:"Rent", color:"#C0604E" },
  { id:"internet", label:"Internet", color:"#9B7FC7" },
  { id:"transport", label:"Transport", color:"#D98E4A" },
  { id:"dining", label:"Dining out", color:"#C97D60" },
  { id:"medical", label:"Medical", color:"#6FB08A" },
  { id:"entertainment", label:"Entertainment", color:"#B0699C" },
  { id:"other", label:"Other", color:"#7C8A93" },
];
const PINNED_TAGS = [];

const catById = id => CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length-1];
const inr = n => new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",maximumFractionDigits:0}).format(n||0);
const monthKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
const monthLabel = key => { const [y,m]=key.split("-").map(Number); return new Date(y,m-1,1).toLocaleDateString("en-IN",{month:"long",year:"numeric"}); };
const todayISO = () => new Date().toISOString().slice(0,10);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,8);
const esc = s => (s||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ---- Google Drive backup config ----
// Replace this with your own OAuth Client ID from Google Cloud Console
// (APIs & Services > Credentials > Create Credentials > OAuth client ID > Web application).
// Add this file's hosted URL (your GitHub Pages origin, e.g. https://yourname.github.io)
// under "Authorized JavaScript origins". See the chat for the full setup walkthrough.
const GOOGLE_CLIENT_ID = "540942890573-hd52hnd8on5jvddp1f131jgmetst16sl.apps.googleusercontent.com";
const DRIVE_FILENAME = "household-ledger-backup.json";

let driveAccessToken = null;
let driveStatus = "idle"; // idle | connecting | syncing | synced | error | offline-disabled
let driveErrorMsg = "";

let memoryFallback = {};
let storageOK = true;
function safeGet(key, def){
  try { const v = localStorage.getItem(key); return v==null ? def : JSON.parse(v); }
  catch(e){ storageOK=false; return memoryFallback[key] !== undefined ? memoryFallback[key] : def; }
}
function safeSet(key, val){
  try { localStorage.setItem(key, JSON.stringify(val)); }
  catch(e){ storageOK=false; memoryFallback[key]=val; }
}

let state = {
  expenses: safeGet("hl-expenses", []),
  budget: safeGet("hl-budget", null),
  cursor: monthKey(new Date()),
  formOpen: false,
  editingId: null,
  listFilterTag: null,
  trendTag: "all",
  trendRange: 6,
  editingBudget: false,
  drawerOpen: false,
  entriesListOpen: false,
  crosshairEnabled: true,
  openDays: new Set(),
};

// One-time migration: entries that were logged as Grocery + tag "Dairy" or
// "Fruits & vegetables" (back when those were tags, not categories) move
// into the new dedicated categories automatically.
(function migrateGroceryTags(){
  let changed = false;
  state.expenses = state.expenses.map(e => {
    if (e.category === "grocery" && e.tag === "Dairy") { changed = true; return { ...e, category: "dairy", tag: "" }; }
    if (e.category === "grocery" && e.tag === "Fruits & vegetables") { changed = true; return { ...e, category: "fruitveg", tag: "" }; }
    return e;
  });
  if (changed) persist();
})();

let driveSyncTimer = null;
let lastDayKeys = [];
function persist(autoSync){
  safeSet("hl-expenses", state.expenses);
  safeSet("hl-budget", state.budget);
  if (autoSync === false) return;
  if (driveAccessToken && safeGet("hl-drive-fileid", null)) {
    clearTimeout(driveSyncTimer);
    driveSyncTimer = setTimeout(() => { driveUpload(); }, 1500);
  }
}

function monthExpenses(){
  return state.expenses.filter(e => monthKey(new Date(e.date)) === state.cursor).sort((a,b)=>b.date.localeCompare(a.date));
}

function allTags(){
  const used = new Set(state.expenses.map(e=>e.tag).filter(Boolean));
  PINNED_TAGS.forEach(t=>used.add(t));
  return [...used].sort((a,b)=>{
    const ap=PINNED_TAGS.includes(a), bp=PINNED_TAGS.includes(b);
    if(ap!==bp) return ap?-1:1;
    return a.localeCompare(b);
  });
}

function render(){
  const me = monthExpenses();
  const total = me.reduce((s,e)=>s+Number(e.amount),0);

  const catMap = {};
  me.forEach(e => catMap[e.category] = (catMap[e.category]||0) + Number(e.amount));
  const byCategory = CATEGORIES.map(c=>({...c, total: catMap[c.id]||0})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const topCategory = byCategory[0];

  const [cy, cm] = state.cursor.split("-").map(Number);
  const now = new Date();
  const isCurrentMonth = now.getFullYear()===cy && now.getMonth()+1===cm;
  const daysElapsed = isCurrentMonth ? now.getDate() : new Date(cy,cm,0).getDate();
  const dailyAvg = total / Math.max(daysElapsed,1);

  const tagTotalsThisMonth = {};
  me.forEach(e=>{ if(e.tag) tagTotalsThisMonth[e.tag] = (tagTotalsThisMonth[e.tag]||0) + Number(e.amount); });

  const listExpenses = state.listFilterTag ? me.filter(e=>e.tag===state.listFilterTag) : me;
  const grouped = {};
  listExpenses.forEach(e=>{ (grouped[e.date] = grouped[e.date]||[]).push(e); });
  const groupedEntries = Object.entries(grouped).sort((a,b)=>b[0].localeCompare(a[0]));
  lastDayKeys = groupedEntries.map(([d])=>d);

  const earliest = state.expenses.length ? state.expenses.reduce((min,e)=> e.date<min?e.date:min, state.expenses[0].date).slice(0,7) : null;
  let span = state.trendRange;
  if(span === "all"){
    if(earliest){ const [ey,em]=earliest.split("-").map(Number); span = (cy-ey)*12 + (cm-em) + 1; } else span = 6;
  }
  function resolveTrendSelection(){
    const v = state.trendTag;
    if(v === "all") return { type:"all", value:null, label:"All spending", color:"#C9A227" };
    if(v.startsWith("cat:")){ const c = catById(v.slice(4)); return { type:"category", value:c.id, label:c.label, color:c.color }; }

function renderTrendSvg(trend, color, opts){
  opts = opts || {};
  color = color || "#C9A227";
  const id = opts.id || "trend-svg";
  const H = opts.height || 180;
  if(trend.every(t=>t.total===0) && trend.length<=1){
    return `<div style="font-size:13px;color:var(--text-faint);padding:20px 0;">Not enough data yet.</div>`;
  }
  const W = 640, padL = 46, padR = 10, padT = 14, padB = 24;
  const min = Math.min(0, ...trend.map(t=>t.total));
  const max = Math.max(0, ...trend.map(t=>t.total), 1);
  const range = (max - min) || 1;
  const stepX = (W-padL-padR) / Math.max(trend.length-1,1);
  const yFor = v => padT + (H-padT-padB) * (1 - (v - min)/range);
  const pts = trend.map((t,i)=> ({ x: padL + i*stepX, y: yFor(t.total), label: t.label, total: t.total }));
  const path = pts.map((p,i)=> (i===0?"M":"L") + p.x.toFixed(1) + " " + p.y.toFixed(1)).join(" ");
  const gridLines = [0,0.5,1].map(f=>{
    const val = min + range*(1-f);
    const y = yFor(val);
    return `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--border)" stroke-dasharray="3 3"/>
             <text x="4" y="${y+4}" font-size="10">${Math.abs(val)>=1000?(val<0?"-":"")+Math.round(Math.abs(val)/1000)+"k":Math.round(val)}</text>`;
  }).join("");
  const zeroLine = min < 0 ? `<line x1="${padL}" y1="${yFor(0)}" x2="${W-padR}" y2="${yFor(0)}" stroke="var(--border-strong)"/>` : "";
  const showEvery = trend.length>12 ? Math.ceil(trend.length/12) : 1;
  const labels = pts.map((p,i)=> i%showEvery===0 ? `<text x="${p.x}" y="${H-6}" font-size="11" text-anchor="middle">${p.label}</text>` : "").join("");
  const dots = pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="${color}"/>`).join("");
  return `<svg id="${id}" class="trend-chart" viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;touch-action:pan-y;" data-points='${JSON.stringify(pts).replace(/'/g,"&#39;")}' data-padl="${padL}" data-padr="${padR}" data-color="${color}">
    ${gridLines}
    ${zeroLine}
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2"/>
    ${dots}
    <g class="chart-crosshair" opacity="0">
      <line class="ch-vline" x1="0" y1="${padT}" x2="0" y2="${H-padB}" stroke="var(--text-faint)" stroke-width="1" stroke-dasharray="3 3"/>
      <line class="ch-hline" x1="${padL}" y1="0" x2="${W-padR}" y2="0" stroke="var(--text-faint)" stroke-width="1" stroke-dasharray="3 3"/>
      <circle class="ch-dot" r="4.5" fill="${color}" stroke="var(--bg)" stroke-width="1.5"/>
      <g class="ch-tooltip">
        <rect class="ch-tooltip-bg" y="0" height="30" rx="5" fill="var(--surface)" stroke="var(--border-strong)"/>
        <text class="ch-tooltip-date" y="12" font-size="10" text-anchor="middle" fill="var(--text-muted)"></text>
        <text class="ch-tooltip-value" y="24" font-size="12" font-weight="600" text-anchor="middle" fill="var(--text)"></text>
      </g>
    </g>
    <rect class="chart-hitzone" x="${padL}" y="0" width="${W-padL-padR}" height="${H}" fill="transparent"/>
  </svg>`;
}

function wireChartCrosshair(svg){
  const pts = JSON.parse(svg.dataset.points);
  const viewBox = svg.viewBox.baseVal;
  const group = svg.querySelector(".chart-crosshair");
  const vline = svg.querySelector(".ch-vline");
  const hline = svg.querySelector(".ch-hline");
  const dot = svg.querySelector(".ch-dot");
  const tooltipG = svg.querySelector(".ch-tooltip");
  const tooltipBg = svg.querySelector(".ch-tooltip-bg");
  const tooltipDate = svg.querySelector(".ch-tooltip-date");
  const tooltipValue = svg.querySelector(".ch-tooltip-value");

  function showAt(clientX){
    const rect = svg.getBoundingClientRect();
    const svgX = ((clientX - rect.left) / rect.width) * viewBox.width;
    let nearest = pts[0], nearestDist = Infinity;
    for (const p of pts){
      const d = Math.abs(p.x - svgX);
      if (d < nearestDist){ nearest = p; nearestDist = d; }
    }
    vline.setAttribute("x1", nearest.x); vline.setAttribute("x2", nearest.x);
    hline.setAttribute("y1", nearest.y); hline.setAttribute("y2", nearest.y);
    dot.setAttribute("cx", nearest.x); dot.setAttribute("cy", nearest.y);
    const valueText = inr(nearest.total);
    tooltipDate.textContent = nearest.label;
    tooltipValue.textContent = valueText;
    const tw = Math.max(50, Math.max(nearest.label.length, valueText.length) * 6.5 + 14);
    tooltipBg.setAttribute("width", tw);
    tooltipBg.setAttribute("x", -tw/2);
    tooltipDate.setAttribute("x", 0);
    tooltipValue.setAttribute("x", 0);
    let tx = nearest.x, ty = nearest.y - 38;
    if (tx - tw/2 < 2) tx = tw/2 + 2;
    if (tx + tw/2 > viewBox.width - 2) tx = viewBox.width - 2 - tw/2;
    if (ty < 2) ty = nearest.y + 10;
    tooltipG.setAttribute("transform", `translate(${tx},${ty})`);
    group.setAttribute("opacity", "1");
  }
  function hide(){ group.setAttribute("opacity", "0"); }

  let dragging = false;
  svg.addEventListener("pointerdown", (e)=>{ dragging = true; showAt(e.clientX); });
  svg.addEventListener("pointermove", (e)=>{ if (dragging) showAt(e.clientX); });
  window.addEventListener("pointerup", ()=>{ dragging = false; });
  svg.addEventListener("pointerleave", ()=>{ if(!dragging) hide(); });
  svg.addEventListener("pointercancel", hide);
}

function renderDriveStatus(){
  const fileId = safeGet("hl-drive-fileid", null);
  const lastSync = safeGet("hl-drive-last-sync", null);
  if (GOOGLE_CLIENT_ID.indexOf("PASTE_YOUR_CLIENT_ID") === 0) {
    return `<div class="drive-status"><span class="drive-dot"></span>Google Drive backup not set up yet</div>`;
  }
  if (driveStatus === "error") {
    return `<div class="drive-status"><span class="drive-dot err"></span>Drive error: ${esc(driveErrorMsg)}</div>`;
  }
  if (driveStatus === "connecting" || driveStatus === "syncing") {
    return `<div class="drive-status"><span class="drive-dot busy"></span>${driveStatus === "connecting" ? "Connecting to Drive&hellip;" : "Syncing to Drive&hellip;"}</div>`;
  }
  if (driveAccessToken && fileId) {
    const when = lastSync ? new Date(lastSync).toLocaleString("en-IN", { day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" }) : "not yet";
    return `<div class="drive-status"><span class="drive-dot on"></span>Backed up to Drive &middot; last sync ${when}</div>`;
  }
  return `<div class="drive-status"><span class="drive-dot"></span>Not backed up to Drive on this device</div>`;
}

function driveRedirectUri(){
  // Normalize so the address sent to Google is always the same, whether the
  // app was opened as ".../household-ledger/" or ".../household-ledger/index.html".
  let path = location.pathname;
  if (path.endsWith("index.html")) path = path.slice(0, -("index.html".length));
  if (!path.endsWith("/")) path += "/";
  return location.origin + path;
}

function driveAuthUrl(promptMode, action){
  const params = new URLSearchParams({
    client_id: GOOGLE_CLIENT_ID,
    redirect_uri: driveRedirectUri(),
    response_type: "token",
    scope: "https://www.googleapis.com/auth/drive.file",
    include_granted_scopes: "true",
    state: action || "connect",
  });
  if (promptMode) params.set("prompt", promptMode);
  return "https://accounts.google.com/o/oauth2/v2/auth?" + params.toString();
}

function goToDriveAuth(promptMode, action){
  window.location.href = driveAuthUrl(promptMode, action);
}

// Runs once on page load. If Google just redirected back here with a token
// (or an error) in the URL, this reads it and cleans the address bar.
function consumeDriveAuthRedirect(){
  const hash = location.hash || "";
  if (hash.indexOf("access_token=") === -1 && hash.indexOf("error=") === -1) return false;
  const params = new URLSearchParams(hash.slice(1));
  const action = params.get("state") || "connect";
  history.replaceState(null, "", location.pathname + location.search);

  const token = params.get("access_token");
  if (token) {
    driveAccessToken = token;
    const expiresInMs = (Number(params.get("expires_in")) || 3500) * 1000;
    safeSet("hl-drive-token", token);
    safeSet("hl-drive-token-expiry", Date.now() + expiresInMs - 60000);
    if (action === "restore") driveRestore();
    else if (action === "connect") driveUpload();
    else { driveStatus = "synced"; render(); } // action === "silent"
  } else if (action !== "silent") {
    // Only show an error for something the person actually clicked; a failed
    // silent background attempt should stay invisible and just leave them disconnected.
    driveStatus = "error"; driveErrorMsg = params.get("error") || "sign-in was cancelled";
    render();
  } else {
    driveStatus = "idle"; render();
  }
  return true;
}

async function driveFindFileId(){
  const q = encodeURIComponent(`name='${DRIVE_FILENAME}' and trashed=false`);
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name,modifiedTime)`, {
    headers: { Authorization: `Bearer ${driveAccessToken}` },
  });
  if (!res.ok) throw new Error(`Drive lookup failed (${res.status})`);
  const data = await res.json();
  return (data.files && data.files[0]) ? data.files[0].id : null;
}

async function driveUpload(){
  driveStatus = "syncing"; render();
  try {
    const payload = JSON.stringify({ expenses: state.expenses, budget: state.budget, exportedAt: new Date().toISOString() }, null, 2);
    let fileId = safeGet("hl-drive-fileid", null);
    if (!fileId) fileId = await driveFindFileId();

    if (fileId) {
      const res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
        method: "PATCH",
        headers: { Authorization: `Bearer ${driveAccessToken}`, "Content-Type": "application/json" },
        body: payload,
      });
      if (res.status === 401) return reauthThen(() => driveUpload());
      if (!res.ok) throw new Error(`Upload failed (${res.status})`);
    } else {
      const boundary = "hl_backup_boundary";
      const metadata = { name: DRIVE_FILENAME, mimeType: "application/json" };
      const body =
        `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
        `--${boundary}\r\nContent-Type: application/json\r\n\r\n${payload}\r\n--${boundary}--`;
      const res = await fetch(`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id`, {
        method: "POST",
        headers: { Authorization: `Bearer ${driveAccessToken}`, "Content-Type": `multipart/related; boundary=${boundary}` },
        body,
      });
      if (res.status === 401) return reauthThen(() => driveUpload());
      if (!res.ok) throw new Error(`Create failed (${res.status})`);
      const data = await res.json();
      fileId = data.id;
    }
    safeSet("hl-drive-fileid", fileId);
    safeSet("hl-drive-last-sync", new Date().toISOString());
    driveStatus = "synced";
  } catch (err) {
    driveStatus = "error"; driveErrorMsg = err.message || "sync failed";
  }
  render();
}

async function driveRestore(){
  driveStatus = "syncing"; render();
  try {
    let fileId = safeGet("hl-drive-fileid", null);
    if (!fileId) fileId = await driveFindFileId();
    if (!fileId) throw new Error("No backup file found in this Google account");
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: `Bearer ${driveAccessToken}` },
    });
    if (res.status === 401) return reauthThen(() => driveRestore());
    if (!res.ok) throw new Error(`Restore failed (${res.status})`);
    const data = await res.json();
    if (!Array.isArray(data.expenses)) throw new Error("Backup file looks invalid");
    const proceed = window.confirm(`Found a Drive backup with ${data.expenses.length} entries. This will replace everything currently on this device. Continue?`);
    if (!proceed) { driveStatus = "synced"; render(); return; }
    state.expenses = data.expenses;
    state.budget = typeof data.budget === "number" ? data.budget : null;
    persist(false);
    safeSet("hl-drive-fileid", fileId);
    safeSet("hl-drive-last-sync", new Date().toISOString());
    driveStatus = "synced";
    window.alert("Restored from Google Drive.");
  } catch (err) {
    driveStatus = "error"; driveErrorMsg = err.message || "restore failed";
  }
  render();
}

// If a request comes back 401 (token died mid-session), try one silent
// re-auth redirect before giving up and asking the person to reconnect.
function reauthThen(retryAction){
  driveAccessToken = null;
  safeSet("hl-drive-token", null);
  safeSet("hl-drive-token-expiry", 0);
  if (navigator.onLine) {
    safeSet("hl-drive-retry-action", retryAction === driveRestore ? "restore" : "connect");
    goToDriveAuth("none", "silent");
  } else {
    driveStatus = "error"; driveErrorMsg = "signed out \u2014 reconnect when back online"; render();
  }
}

function connectDrive(){
  driveStatus = "connecting"; render();
  goToDriveAuth(undefined, "connect");
}

function exportBackup(){
  const data = { expenses: state.expenses, budget: state.budget, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `household-ledger-backup-${todayISO()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function csvCell(v){
  const s = String(v==null?"":v);
  return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
}

function exportExcel(){
  const rows = [["Date","Category","Tag","Note","Amount (INR)"]];
  const sorted = [...state.expenses].sort((a,b)=>a.date.localeCompare(b.date));
  sorted.forEach(e => {
    rows.push([e.date, catById(e.category).label, e.tag||"", e.note||"", Number(e.amount)]);
  });
  const total = sorted.reduce((s,e)=>s+Number(e.amount),0);
  rows.push(["", "", "", "TOTAL", total]);
  const csv = rows.map(r => r.map(csvCell).join(",")).join("\r\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `household-ledger-all-entries-${todayISO()}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function attachHandlers(){
  const app = document.getElementById("app");

  app.querySelectorAll("[data-action]").forEach(el=>{
    const action = el.dataset.action;
    if(el.tagName==="SELECT"){
      if(action==="trend-range") el.onchange = () => { state.trendRange = el.value==="all"?"all":Number(el.value); render(); };
      if(action==="trend-tag") el.onchange = () => { state.trendTag = el.value; render(); };
      return;
    }
    el.onclick = () => {
      switch(action){
        case "prev-month": { const [y,m]=state.cursor.split("-").map(Number); state.cursor=monthKey(new Date(y,m-2,1)); state.listFilterTag=null; render(); break; }
        case "next-month": { const [y,m]=state.cursor.split("-").map(Number); state.cursor=monthKey(new Date(y,m,1)); state.listFilterTag=null; render(); break; }
        case "open-form": state.formOpen=true; state.editingId=null; render(); document.getElementById("expense-form")?.querySelector("[name=amount]")?.focus(); break;
        case "cancel-form": state.formOpen=false; state.editingId=null; render(); break;
        case "edit-entry": state.formOpen=true; state.editingId=el.dataset.id; render(); try{ document.getElementById("expense-form").scrollIntoView({behavior:"smooth", block:"center"}); }catch(e){} break;
        case "delete-entry": state.expenses = state.expenses.filter(x=>x.id!==el.dataset.id); if(state.editingId===el.dataset.id){state.editingId=null; state.formOpen=false;} persist(); render(); break;
        case "filter-tag": state.listFilterTag = state.listFilterTag===el.dataset.tag ? null : el.dataset.tag; render(); break;
        case "edit-budget": state.editingBudget=true; render(); document.getElementById("budget-draft")?.focus(); break;
        case "cancel-budget": state.editingBudget=false; render(); break;
        case "save-budget": { const v=Number(document.getElementById("budget-draft").value); state.budget = v>0?v:null; state.editingBudget=false; persist(); render(); break; }
        case "toggle-crosshair": state.crosshairEnabled = el.checked; render(); break;
        case "export-backup": exportBackup(); break;
        case "import-backup": document.getElementById("import-file-input").click(); break;
        case "export-excel": exportExcel(); break;
        case "connect-drive": connectDrive(); break;
        case "sync-drive": driveUpload(); break;
        case "restore-drive": driveAccessToken ? driveRestore() : goToDriveAuth(undefined, "restore"); break;
        case "disconnect-drive": {
          const ok = window.confirm("Disconnect Google Drive? Your data stays on this device and in the Drive backup file \u2014 you just won't auto-sync until you reconnect.");
          if (!ok) break;
          driveAccessToken = null;
          safeSet("hl-drive-token", null);
          safeSet("hl-drive-token-expiry", 0);
          driveStatus = "idle";
          render();
          break;
        }
        case "toggle-drawer": state.drawerOpen = !state.drawerOpen; render(); break;
        case "close-drawer": state.drawerOpen = false; render(); break;
        case "toggle-all-days": {
          state.entriesListOpen = !state.entriesListOpen;
          if (!state.entriesListOpen) state.openDays.clear();
          render();
          break;
        }
      }
    };
  });

  app.querySelectorAll("details.day-group").forEach(el=>{
    el.ontoggle = () => {
      const d = el.dataset.date;
      if (el.open) state.openDays.add(d); else state.openDays.delete(d);
    };
  });

  if (state.crosshairEnabled) app.querySelectorAll("svg.trend-chart").forEach(svg => wireChartCrosshair(svg));

  const fileInput = document.getElementById("import-file-input");
  if (fileInput) {
    fileInput.onchange = (ev) => {
      const file = ev.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!Array.isArray(data.expenses)) throw new Error("Not a valid backup file");
          const proceed = window.confirm(
            `This backup has ${data.expenses.length} entries. Import will replace everything currently in the ledger. Continue?`
          );
          if (!proceed) return;
          state.expenses = data.expenses;
          state.budget = typeof data.budget === "number" ? data.budget : null;
          persist();
          render();
          window.alert("Backup imported.");
        } catch (e) {
          window.alert("Could not read this file as a ledger backup: " + e.message);
        }
      };
      reader.readAsText(file);
    };
  }

  const form = document.getElementById("expense-form");
  if(form){
    form.onsubmit = (ev) => {
      ev.preventDefault();
      const fd = new FormData(form);
      const amt = Number(fd.get("amount"));
      if(fd.get("amount")==="" || isNaN(amt)) return;
      const payload = { date: fd.get("date"), category: fd.get("category"), amount: amt, note: (fd.get("note")||"").trim(), tag: (fd.get("tag")||"").trim() };
      if(state.editingId){
        state.expenses = state.expenses.map(x=> x.id===state.editingId ? {...x,...payload} : x);
      } else {
        state.expenses.push({ id: uid(), ...payload });
      }
      state.formOpen=false; state.editingId=null;
      persist();
      render();
    };
  }
}

try {
  render();
} catch (err) {
  document.getElementById("app").innerHTML =
    '<div style="padding:2rem;text-align:center;color:#D9776A;">' +
    'Something went wrong loading the ledger: ' + (err && err.message ? err.message : "unknown error") +
    '<br><br><span style="color:#8E9490;font-size:13px;">Try opening this file directly in your browser (not inside another app\'s preview), or reload the page.</span></div>';
}

// If we just landed back here from Google's sign-in page, finish that flow first.
// Otherwise: reuse a still-valid saved token, or (if this device was connected
// before and we're online) try one silent background reconnect with no popup
// and no visible prompt.
(function restoreDriveSession(){
  if (consumeDriveAuthRedirect()) return;
  const savedToken = safeGet("hl-drive-token", null);
  const expiry = safeGet("hl-drive-token-expiry", 0);
  const fileId = safeGet("hl-drive-fileid", null);
  if (savedToken && Date.now() < expiry) {
    driveAccessToken = savedToken;
    driveStatus = "synced";
    render();
    return;
  }
  if (fileId && navigator.onLine) {
    goToDriveAuth("none", "silent");
  }
})();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {
      // Offline-first still works via localStorage even if the service worker fails to register;
      // it just won't be cached for zero-network loads until this succeeds.
    });
  });
}
